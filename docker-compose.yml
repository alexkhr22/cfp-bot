version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: cfp_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: cfp_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cfp_user:strongpassword@db:5432/cfp_bot
      SYSTEM_USER_ID: 1
    ports:
      - "3000:3000"

volumes:
  postgres_data: